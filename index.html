<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="styles.css">


    <title>Chandrayaan-3 Mission</title>
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div id="progress-bar"></div>
    <header>
        <div class="logo" style="font-size: 1.5rem; font-weight: bold; color: #fff; letter-spacing: 2px;">
            <a href="index.html" style="color: #fff; text-decoration: none;">CHANDRAYAAN</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav>
            <ul>
                <li><a href="mission_overview.html">Mission Overview</a></li>
                <li><a href="launch_details.html">Launch Details</a></li>
                <li><a href="scientific_instruments.html">Scientific Instruments</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="title" style="margin-bottom: 30px;">

            <h1>
                <font color="pink"><u>
                        <style>
                            .blink {
                                animation: blinker 1.5s linear infinite;
                                color: aqua;
                                font-family: 'Poppins', sans-serif;
                            }

                            @keyframes blinker {
                                50% {
                                    opacity: 0;
                                }
                            }
                        </style>



                        <marquee class="blink">
                            WELCOME</marquee>
                    </u></font>
            </h1><br>
            <h1 style="color: #90ee90;"><u>CHANDRAYAAN-3 MISSION</u></h1>
        </div>
        <p>
        <h3>
            <marquee scrollamount="15">Welcome to the Chandrayaan-3 mission website. Explore the latest information
                about India's lunar exploration.</marquee>
        </h3>
        </p>
    </main>
    <footer>
        <p>made with ❤️ by Rishabh<br>designed with elegance 2026</p>
    </footer>
    <script>
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('progress-bar').style.width = scrolled + '%';
        });

        const hamburger = document.getElementById('hamburger');
        const nav = document.querySelector('nav');

        hamburger.addEventListener('click', function() {
            this.classList.toggle('active');
            nav.classList.toggle('open');
        });

        document.addEventListener('click', function(event) {
            if (nav.classList.contains('open') && !hamburger.contains(event.target)) {
                if (event.target.tagName !== 'A') {
                    nav.classList.remove('open');
                    hamburger.classList.remove('active');
                }
            }
        });

        const currentPath = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('nav ul li a').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active-link');
            }
        });
    </script>
</body>

</html>
